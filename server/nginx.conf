# 腾讯云 Nginx 反代示例（放在 /etc/nginx/conf.d/gardener.conf）
# 注意：仅当你「自管服务器（CVM）部署」时才需要本文件。
# 若使用「腾讯云托管（CloudBase 云托管）」，API 网关、负载均衡、HTTPS、域名证书
# 都在云托管控制台一键配置，无需自建 Nginx。
# 前提：已申请域名并在腾讯云 SSL 下载证书，放到 /etc/nginx/ssl/
server {
    listen 80;
    server_name your-domain.example.com;
    # 小程序要求 HTTPS，80 端口统一跳转 443
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.example.com;

    ssl_certificate     /etc/nginx/ssl/your-domain.crt;
    ssl_certificate_key /etc/nginx/ssl/your-domain.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 后端 API 反代
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / 长连接 AI 对话所需
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }
}
